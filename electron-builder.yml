appId: com.sales-claw
productName: Sales Claw
copyright: MIT License

# 自動更新: GitHub Releases から配信
# Release CI で GH_OWNER / GH_REPO を設定して、fork 先に誤配信しないようにする
publish:
  provider: github
  owner: ${env.GH_OWNER}
  repo: ${env.GH_REPO}

# asar無効でファイルパスをシンプルに
asar: false

directories:
  output: dist
  buildResources: assets

extraResources:
  - from: assets
    to: assets
    filter:
      - favicon.png
      - icon.png
      - icon.ico
      - tray.png

# パッケージに含めるファイル
files:
  - "**/*"
  - "!dist/**"
  - "!.git/**"
  - "!.github/**"
  - "!screenshots/**"
  - "!data/settings.json"
  - "!data/action-log.json"
  - "!data/contact-history.json"
  - "!data/dashboard-runtime.json"
  - "!data/dashboard-start.*"
  - "!data/live-monitor.json"
  - "!data/update-status.json"
  - "!data/outreach-targets.json"
  - "!data/claude-prompts/**"
  - "!data/imports/**"
  - "!data/*.csv"
  - "data/sample-targets.csv"
  - "!*.xlsx"
  - "!*.log"
  - "!tmp/**"
  - "!temp/**"
  - "!launch-silent.vbs"
  - "!launch.sh"
  - "!.claude/settings.local.json"
  - "!assets/名称未設定のデザイン.png"

# Windows インストーラー (NSIS)
# artifactName でハイフン区切りに固定 → latest.yml と GitHub アセット名を一致させる
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  artifactName: "Sales-Claw-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sales Claw

# macOS
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.png
  category: public.app-category.business
  artifactName: "Sales-Claw-${version}-${arch}.${ext}"

dmg:
  title: Sales Claw Installer
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# Linux
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: assets/icon.png
  category: Office
  artifactName: "Sales-Claw-${version}-${arch}.${ext}"

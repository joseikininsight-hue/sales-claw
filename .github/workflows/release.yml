name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: warn
          retention-days: 7

  release:
    needs: build
    if: always() && contains(needs.build.result, 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sales Claw ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            dist-all/*.exe
            dist-all/*.dmg
            dist-all/*.AppImage
          body: |
            ## インストール方法

            | OS | ダウンロード |
            |----|------------|
            | Windows | `Sales Claw Setup *.exe` |
            | macOS | `Sales Claw-*.dmg` |
            | Linux | `Sales Claw-*.AppImage` |

            ## 前提条件（別途インストールが必要）

            1. **Claude Code CLI**
               ```
               npm install -g @anthropic-ai/claude-code
               ```
            2. アプリ起動後、Settings タブで自社情報を設定してください。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

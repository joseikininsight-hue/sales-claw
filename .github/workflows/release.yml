name: Build & Release

on:
  push:
    tags:
      - 'v*'   # v1.0.0 のようなタグをプッシュすると自動ビルド

jobs:
  build:
    strategy:
      fail-fast: false   # 1プラットフォームが失敗しても他を続行
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm \
            fakeroot \
            dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: dist/
          retention-days: 7

  release:
    needs: build
    if: always() && contains(needs.build.result, 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sales Claw ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist-all/**/*.exe
            dist-all/**/*.dmg
            dist-all/**/*.AppImage
          body: |
            ## インストール方法

            | OS | ダウンロード |
            |----|------------|
            | Windows | `Sales Claw Setup *.exe` |
            | macOS | `Sales Claw-*.dmg` |
            | Linux | `Sales Claw-*.AppImage` |

            ## 前提条件（別途インストールが必要）

            1. **Claude Code CLI** — [インストール手順](https://docs.anthropic.com/claude-code)
               ```
               npm install -g @anthropic-ai/claude-code
               ```

            2. このアプリを起動後、Settings タブで自社情報を設定してください。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
